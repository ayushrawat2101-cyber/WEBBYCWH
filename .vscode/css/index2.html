<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       /*div{
            color :black;
            background-color:red;
        }*/
        .red{
            color:black;
            background-color:red;
        }
        #green{
            color:black;
            background-color:green;
        }
        /*child selector*/
        div >p{
            color : blue ;
            background-color:brown;
        }
        /*descendant propert*/
        div p{
            color :blue;
            background-color : red;
        }
        /*universal selector*/
        *{
            margin:0;
            padding:0;
        }
        /*pseudo selector */
        a:visited {
            color : red ;
        }
        a:link {
            color:rgb(183, 82, 102);
        }
        a:active{
            background-color:coral;
        }
        a:hover {
            color : yellow;
            background-color:blueviolet;
        }
        p:first-child{
            color:aqua;
            background-color:blueviolet;
        }
    </style>
</head>
<body>
    <main>
        <p>the first child</p>
        <p>the second child</p>
    </main>
    <div class ="red">
        <h3>I AM DIV</h3> 
        <p>this is an para tag </p>
    </div >
    <div id="green">
        <h3>hey i am ayush</h3>
    </div>
    <div>
        <article>
        <p>HEY I AM AYUSH </p>
        </article>
    </div>
    <a href = "https://www.google.com">GOOGLE</a><br>
    <a href = "https://www.facebook.com">FACEBOOK</a><br>
    <a href = "https://www.youtube.com">YOUTUBE</a>
</body>
</html>
