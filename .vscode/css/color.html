<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*color keyword*/
        h1{
            color:darkgoldenrod;
        }
        /* color in hexacode*/
        h2{
            color:#8b0000;
        }
        /* color in rgb*/
        h3{
            color:rgb(235, 125,59);
        }
        /*color in rgba*/
        h4{
            color:rgba(10,90,10,0.67);
        }
        /*hsl color */
        h5{
            color:hsl(100, 250%, 44%);
        }
    </style>
</head>
<body>

    <hr>
    <h2>there are three ways to declare color </h2>
    <ol>
        <li>
            <h2>hexacode</h2>
        </li>
        <li>
            <h3>
                Rgb code
            </h3>
        </li>
        <li>
            <h4>rgba</h4>
        </li>
        <li>
<h5>hsl</h5>
        </li>
    </ol>
</body>
</html>
